<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>데모 단어 고르기</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Apple SD Gothic Neo",system-ui,sans-serif; color:#33414f; background:#f3f7fb; }
  header { position:sticky; top:0; z-index:5; background:#fff; border-bottom:1px solid #e3eaf1;
           padding:14px 20px; box-shadow:0 4px 14px rgba(0,0,0,.05); }
  header h1 { margin:0 0 4px; font-size:20px; }
  header p { margin:0; font-size:13px; color:#7c8a99; }
  .bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:10px; }
  .count { font-weight:700; font-size:16px; }
  .count.warn { color:#d9772b; }
  .count.ok { color:#2f9e6e; }
  button { font:inherit; cursor:pointer; border:1px solid #cdd9e4; background:#fff; border-radius:8px;
           padding:7px 14px; color:#33414f; }
  button.primary { background:#2f9e6e; color:#fff; border-color:#2f9e6e; }
  main { padding:18px 20px 160px; max-width:1300px; margin:0 auto; }
  .cat { margin-bottom:26px; }
  .cat__h { display:flex; align-items:center; gap:12px; margin:10px 0; }
  .cat__h h2 { font-size:18px; margin:0; }
  .cat__h .n { font-size:13px; color:#7c8a99; }
  .cat__h .toggle { font-size:12px; padding:4px 10px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; }
  .w { background:#fff; border:2px solid #e3eaf1; border-radius:14px; padding:10px 8px 8px;
       text-align:center; cursor:pointer; transition:border-color .1s,box-shadow .1s; position:relative; }
  .w.on { border-color:#2f9e6e; box-shadow:0 4px 12px rgba(47,158,110,.18); }
  .w.off { opacity:.45; filter:grayscale(.7); }
  .w img { width:72px; height:72px; object-fit:contain; pointer-events:none; }
  .w .wd { font-size:17px; font-weight:700; margin-top:4px; }
  .w .ck { position:absolute; top:6px; right:6px; width:20px; height:20px; border-radius:50%;
           border:2px solid #cdd9e4; background:#fff; font-size:13px; line-height:18px; color:#fff; }
  .w.on .ck { background:#2f9e6e; border-color:#2f9e6e; }
  footer { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #e3eaf1;
           padding:12px 20px; box-shadow:0 -4px 14px rgba(0,0,0,.06); }
  footer .row { display:flex; gap:10px; align-items:center; max-width:1300px; margin:0 auto; }
  textarea { flex:1; height:46px; font-family:ui-monospace,monospace; font-size:12px; resize:vertical;
             border:1px solid #cdd9e4; border-radius:8px; padding:8px; }
  .hint { font-size:12px; color:#7c8a99; }
</style>
</head>
<body>
<header>
  <h1>데모 단어 고르기 🚂</h1>
  <p>특교 단어 셋(그림 있는 353개) 중에서 그림이 잘 맞고 <b>쉬운 것</b> 위주로 골라요. 카드를 누르면 켜짐/꺼짐. <b>추상적인 단어는 미리 꺼둔 상태</b>예요.</p>
  <div class="bar">
    <span class="count" id="count">0개 선택</span>
    <button id="all">전체 켜기</button>
    <button id="none">전체 끄기</button>
    <span class="hint">끝말잇기가 풀리려면 다양한 시작·끝 글자가 필요해요. 너무 적으면 게임이 안 될 수 있어요(대략 60개+ 권장).</span>
  </div>
</header>

<main id="cats">불러오는 중…</main>

<footer>
  <div class="row">
    <button class="primary" id="copy">선택 목록 복사</button>
    <textarea id="out" readonly placeholder="여기에 선택한 단어 목록이 나옵니다. 복사해서 저(클로드)에게 붙여넣어 주세요."></textarea>
  </div>
</footer>

<script>
let WORDS = [];
const selected = new Set();
// 추상적이라 그림이 애매한 단어 — 처음부터 꺼둔 상태로 보여줌(필요하면 다시 켜기)
const DENY = new Set(["미소","약속","이야기","차례","소리","박수","다섯","나이","사랑","행복","웃음","눈물","인사","축하","과학","수학","색깔","그림자","산책","여행","운동","게임","경기","보물","요정","해적","음악","미술","마술","마음","도시","이웃","주인","손님","축하","생일","방학","휴일","주말","오늘","어제","내일","시간","요일"]);

function refresh() {
  const c = document.getElementById('count');
  c.textContent = selected.size + '개 선택';
  c.className = 'count ' + (selected.size >= 60 ? 'ok' : 'warn');
  document.getElementById('out').value = JSON.stringify([...selected]);
}
function toggle(word, el) {
  if (selected.has(word)) { selected.delete(word); el.classList.remove('on'); el.classList.add('off'); el.querySelector('.ck').textContent=''; }
  else { selected.add(word); el.classList.add('on'); el.classList.remove('off'); el.querySelector('.ck').textContent='✓'; }
  refresh();
}

fetch('tg_words.json').then(r=>r.json()).then(data=>{
  WORDS = data.words;
  const byCat = {};
  WORDS.forEach(w => (byCat[w.category] = byCat[w.category] || []).push(w));
  const main = document.getElementById('cats');
  main.innerHTML = '';
  Object.keys(byCat).forEach(cat => {
    const list = byCat[cat];
    const sec = document.createElement('section'); sec.className = 'cat';
    const h = document.createElement('div'); h.className = 'cat__h';
    h.innerHTML = `<h2>${cat}</h2><span class="n">${list.length}개</span>`;
    const tg = document.createElement('button'); tg.className='toggle'; tg.textContent='이 묶음 토글';
    h.appendChild(tg); sec.appendChild(h);
    const grid = document.createElement('div'); grid.className='grid';
    list.forEach(w => {
      const on = !DENY.has(w.word);
      const el = document.createElement('div'); el.className = 'w ' + (on ? 'on' : 'off');
      el.innerHTML = `<div class="ck">${on ? '✓' : ''}</div><img src="img/${w.pic}.png" alt="${w.word}"><div class="wd">${w.word}</div>`;
      el.addEventListener('click', ()=>toggle(w.word, el));
      grid.appendChild(el);
      if (on) selected.add(w.word);
    });
    tg.addEventListener('click', ()=>{
      const anyOn = list.some(w=>selected.has(w.word));
      list.forEach(w=>{
        const el = [...grid.children].find(c=>c.querySelector('.wd').textContent===w.word);
        if (anyOn) { if(selected.has(w.word)) toggle(w.word, el); }
        else { if(!selected.has(w.word)) toggle(w.word, el); }
      });
    });
    sec.appendChild(grid); main.appendChild(sec);
  });
  refresh();
});

document.getElementById('all').addEventListener('click', ()=>{ document.querySelectorAll('.w').forEach(el=>{ const wd=el.querySelector('.wd').textContent; if(!selected.has(wd)) toggle(wd, el); }); });
document.getElementById('none').addEventListener('click', ()=>{ document.querySelectorAll('.w').forEach(el=>{ const wd=el.querySelector('.wd').textContent; if(selected.has(wd)) toggle(wd, el); }); });
document.getElementById('copy').addEventListener('click', ()=>{ const o=document.getElementById('out'); o.select(); document.execCommand('copy'); navigator.clipboard && navigator.clipboard.writeText(o.value); document.getElementById('copy').textContent='복사됨!'; setTimeout(()=>document.getElementById('copy').textContent='선택 목록 복사',1200); });
</script>
</body>
</html>
